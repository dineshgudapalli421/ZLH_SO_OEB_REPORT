# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.sap.lh.cs.zlhoebreport
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
        backend:
          - path: /sap
            url: http://sapsdvapp.aws.londonhydro.cloud:8000
            client: '200'
          - url: http://sapsdvapp.aws.londonhydro.cloud:8000/
            client: '200'
            path: /sap/opu/odata/SAP/ZWM_FIELD_COMP_WORK_SRV/
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: sap-fe-mockserver
      beforeMiddleware: csp
      configuration:
        mountPath: /
        services:
          - urlPath: /sap/opu/odata/sap/ZWM_SS_ORDER_OEB_SRV
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mainService/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/ZWM_ORDOPR_SCH_SRV
            metadataPath: ./webapp/localService/ORDOPRService/metadata.xml
            mockdataPath: ./webapp/localService/ORDOPRService/data
            generateMockData: true
          - urlPath: /sap/opu/odata/SAP/ZWM_FIELD_COMP_WORK_SRV
            metadataPath: ./webapp/localService/ZWM_FIELD_COMP_WORK_SRV/metadata.xml
            mockdataPath: ./webapp/localService/ZWM_FIELD_COMP_WORK_SRV/data
            generateMockData: true
        annotations: []
